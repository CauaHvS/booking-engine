name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configura Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Executa testes
        run: |
          chmod +x mvnw
          ./mvnw clean verify -B
